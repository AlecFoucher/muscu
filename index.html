<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muscu">
<meta name="theme-color" content="#0f172a">
<title>Programme Salle</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230f172a'/><text x='90' y='118' font-size='110' text-anchor='middle' font-family='-apple-system'>💪</text></svg>">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/programme.css">
<link rel="stylesheet" href="css/repas.css">
</head>
<body>

<!-- ══ Page : Programme ══ -->
<div class="page active" id="page-programme">
  <header>
    <h1>Programme 💪</h1>
    <p class="subtitle" id="today-label"></p>
  </header>

  <div class="day-tabs" id="day-tabs"></div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">Progression du jour</span>
      <span class="progress-count" id="progress-count">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div id="exercises"></div>

  <div class="prog-footer">
    <button class="btn primary" onclick="markAllDone()">Tout cocher</button>
    <button class="btn danger"  onclick="resetDay()">Réinitialiser</button>
  </div>
</div>

<!-- ══ Page : Repas ══ -->
<div class="page" id="page-repas">
  <header>
    <h1>Repas 🥗</h1>
  </header>

  <div class="sub-tabs">
    <button class="sub-tab active" id="subtab-plats"   onclick="switchSubTab('plats')">Plats</button>
    <button class="sub-tab"        id="subtab-courses" onclick="switchSubTab('courses')">
      Liste de courses
      <span class="sub-tab-count" id="courses-count" style="display:none"></span>
    </button>
  </div>

  <div class="sub-page active" id="subpage-plats">
    <div class="section-label">Plats sèche</div>
    <div class="meals-grid" id="meals-grid"></div>
  </div>

  <div class="sub-page" id="subpage-courses">
    <div class="cart-actions">
      <button class="cart-clear-btn" onclick="clearCart()">Tout effacer</button>
    </div>
    <div id="cart-list"></div>
  </div>
</div>

<!-- ══ Navigation ══ -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-programme" onclick="switchPage('programme')">
    <span class="nav-icon">💪</span>
    Programme
  </button>
  <button class="nav-btn" id="nav-repas" onclick="switchPage('repas')">
    <span class="nav-icon">🥗</span>
    Repas
    <span class="nav-badge" id="nav-badge"></span>
  </button>
</nav>

<!-- ══ Timer overlay ══ -->
<div class="timer-overlay" id="timer-overlay">
  <div class="timer-label" id="timer-exercise">Repos</div>
  <div class="timer-circle">
    <svg width="240" height="240">
      <circle class="timer-bg" cx="120" cy="120" r="110"></circle>
      <circle class="timer-fg" id="timer-fg" cx="120" cy="120" r="110"
              stroke-dasharray="691" stroke-dashoffset="0"></circle>
    </svg>
    <div class="timer-text" id="timer-text">60</div>
  </div>
  <div class="timer-buttons">
    <button class="btn" onclick="addTime(15)">+15s</button>
    <button class="btn primary" onclick="closeTimer()">Fermer</button>
  </div>
</div>

<!-- Scripts : ordre important (data & storage avant les modules) -->
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script src="js/timer.js"></script>
<script src="js/programme.js"></script>
<script src="js/repas.js"></script>
<script>
  renderProgramme();
  renderMeals();
  renderCart();
  updateRepasNav();
</script>
</body>
</html>
